name: Build & Release

on:
  push:
    branches: [main, dev]
    paths:
      - '.github/workflows/build.yml'
      - 'requirements.txt'
      - 'build_nuitka.py'
      - 'bilibili.py'
      - 'bilibili_gui.py'
      - 'bilibili_drops_miner/**'
      - 'img/app.ico'
  workflow_dispatch:
    inputs:
      release:
        description: '发布到 Release'
        required: true
        type: boolean
        default: false
      tag:
        description: 'Release 版本号 (如 v1.0.0)'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: gui
            package: bilibili-drops-miner-gui
          - target: cli
            package: bilibili-drops-miner-cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        id: setup-python
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Cache Nuitka and compiler output
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\Nuitka
            ~\AppData\Local\ccache
            dist-nuitka\*.build
          key: ${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-nuitka-${{ matrix.target }}-${{ hashFiles('requirements.txt', 'build_nuitka.py', 'bilibili.py', 'bilibili_gui.py', 'bilibili_drops_miner/**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-nuitka-${{ matrix.target }}-
            ${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-nuitka-

      - name: Install dependencies
        run: |
          python -m pip install --disable-pip-version-check -r requirements.txt
          python -m pip install --disable-pip-version-check nuitka ordered-set zstandard

      - name: Build EXE with Nuitka
        run: python build_nuitka.py --target ${{ matrix.target }}

      - name: Package ZIP file
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path "dist-nuitka/${{ matrix.package }}" -DestinationPath "dist/${{ matrix.package }}.zip" -CompressionLevel Fastest -Force

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}
          path: dist/${{ matrix.package }}.zip
          retention-days: 30

  release:
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
  
      - uses: actions/download-artifact@v4
        with:
          pattern: bilibili-drops-miner-*
          path: dist/
          merge-multiple: true
  
      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=v$(date +%Y%m%d.%H%M%S)" >> "$GITHUB_OUTPUT"
          fi
  
      - name: Rename release files
        run: |
          mv dist/bilibili-drops-miner-gui.zip dist/bilibili-drops-miner-gui-${{ steps.tag.outputs.version }}.zip
          mv dist/bilibili-drops-miner-cli.zip dist/bilibili-drops-miner-cli-${{ steps.tag.outputs.version }}.zip
  
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: ${{ steps.tag.outputs.version }}
          generate_release_notes: true
          files: |
            dist/bilibili-drops-miner-gui-${{ steps.tag.outputs.version }}.zip
            dist/bilibili-drops-miner-cli-${{ steps.tag.outputs.version }}.zip
